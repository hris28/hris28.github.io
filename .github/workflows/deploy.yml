name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: ./garden-src
        run: npm ci

      - name: Build Quartz
        working-directory: ./garden-src
        run: npx quartz build

      - name: Copy portfolio into build output
        run: |
          cp index.html garden-src/public/index.html
          cp about.html garden-src/public/about.html
          cp projects.html garden-src/public/projects.html
          cp resume.html garden-src/public/resume.html
          cp interests.html garden-src/public/interests.html
          cp garden.html garden-src/public/garden.html
          cp 404.html garden-src/public/404.html
          cp -r css garden-src/public/css
          cp -r js garden-src/public/js
          cp -r images garden-src/public/images
          cp -r assets garden-src/public/assets

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: garden-src/public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4