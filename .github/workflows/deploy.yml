name: Deploy site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Quartz dependencies
        working-directory: ./garden-src
        run: npm ci

      - name: Create clean combined site folder
        run: |
          rm -rf _site
          mkdir -p _site

      - name: Copy portfolio files into _site
        run: |
          cp index.html _site/index.html
          cp about.html _site/about.html
          cp projects.html _site/projects.html
          cp resume.html _site/resume.html
          cp interests.html _site/interests.html
          cp 404.html _site/404.html || true

          cp -r css _site/css
          cp -r js _site/js
          cp -r images _site/images

          if [ -d assets ]; then cp -r assets _site/assets; fi

          rm -f _site/garden.html

      - name: Build Quartz garden into /garden
        working-directory: ./garden-src
        run: npx quartz build --output ../_site/garden

      - name: Add deploy proof files
        run: |
          mkdir -p _site/garden
          echo "root deployed at $(date -u)" > _site/deploy-proof.txt
          echo "garden deployed at $(date -u)" > _site/garden/deploy-proof.txt
          echo "<!doctype html><title>Garden test</title><h1>Garden folder works</h1>" > _site/garden/test.html
          touch _site/.nojekyll

      - name: Verify output structure
        run: |
          echo "Root output"
          find _site -maxdepth 3 -type f | sort | head -150

          echo ""
          echo "Garden output"
          find _site/garden -maxdepth 3 -type f | sort | head -150

          echo ""
          test -f _site/index.html
          test -f _site/deploy-proof.txt
          test -f _site/garden/index.html
          test -f _site/garden/deploy-proof.txt
          test -f _site/garden/test.html

          echo "OK: required files exist."

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          force_orphan: true