name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Quartz dependencies
        working-directory: ./garden-src
        run: npm ci

      - name: Create clean combined site folder
        run: |
          rm -rf _site
          mkdir -p _site

      - name: Copy portfolio files into _site
        run: |
          cp index.html _site/index.html
          cp about.html _site/about.html
          cp projects.html _site/projects.html
          cp resume.html _site/resume.html
          cp interests.html _site/interests.html
          cp garden.html _site/garden.html || true
          cp 404.html _site/404.html || true

          cp -r css _site/css
          cp -r js _site/js
          cp -r images _site/images

          if [ -d assets ]; then cp -r assets _site/assets; fi

      - name: Build Quartz garden into /garden
        working-directory: ./garden-src
        run: npx quartz build --output ../_site/garden

      - name: Disable Jekyll processing
        run: touch _site/.nojekyll

      - name: Add deploy proof files
        run: |
          echo "root deployed at $(date -u)" > _site/deploy-proof.txt
          echo "garden deployed at $(date -u)" > _site/garden/deploy-proof.txt
          
      - name: Verify output structure
        run: |
          echo "Root output"
          find _site -maxdepth 2 -type f | sort | head -100

          echo ""
          echo "Garden output"
          find _site/garden -maxdepth 3 -type f | sort | head -100

          echo ""
          echo "Required files check"
          test -f _site/index.html
          test -f _site/garden/index.html

          echo "Required files exist."

      - name: Fix file permissions
        run: |
          find _site -type d -exec chmod 755 {} \;
          find _site -type f -exec chmod 644 {} \;

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
          # include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4